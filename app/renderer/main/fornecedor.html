    <script src="fornecedor.js"></script>
        <style> 
/* style.css - Extensão para o formulário de Cliente */

/* 1. Definição de Variáveis (Mude tudo aqui rapidamente) */
:root {
    --bg-dark: #0f172a;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-dim: #64748b;
    --radius: 12px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 2. Layout Centralizado com Grid (Substitui os margins repetidos) */
body {
    background-color: var(--bg-dark);
    display: grid;
    place-content: center; /* Centraliza vertical e horizontal */
    min-height: 100vh;
    gap: 20px; /* Controla o espaço entre TODOS os elementos do formulário */
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
}

/* 3. Estilo Base para Inputs e Buttons (Evita repetição) */
input[type="text"], 
button {
    width: 100%;
    min-width: 320px;
    max-width: 440px;
    padding: 16px 20px;
    border-radius: var(--radius);
    font-size: 1rem;
    transition: var(--transition);
    box-sizing: border-box;
}

/* 4. Customização dos Inputs */
input[type="text"] {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: white;
    backdrop-filter: blur(10px);
    outline: none;
}

input[type="text"]:focus {
    background: rgba(255, 255, 255, 0.07);
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
}

/* 5. Estilo dos Botões Secundários (Navegação) */
button:not(#save-button) {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:not(#save-button):hover {
    background: var(--glass-border);
    color: white;
}

/* 6. Botão de Destaque (Salvar) */
#save-button {
    background: var(--primary);
    border: none;
    color: white;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
}

#save-button:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
}

#save-button:active {
    transform: translateY(0);
}

/* Remove BRs e limpa placeholders */
br { display: none; }
::placeholder { color: var(--text-dim); }

</style>
</body>

</html>

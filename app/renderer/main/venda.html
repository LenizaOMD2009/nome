<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link href="https://cdn.datatables.net/responsive/3.0.8/css/responsive.bootstrap5.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <title>Vendas</title>
</head>

<body>
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><span onclick="window.electronAPI.openPage('index.html')" style="cursor: pointer;">Home</span></li>
                <li class="breadcrumb-item active" aria-current="page">Vendas</li>
            </ol>
        </nav>

        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Gestão de Vendas</h5>
                <div>
                    <button class="btn btn-secondary" id="voltar-button">Voltar</button>
                    <button class="btn btn-primary" id="cadastro-button">Nova Venda</button>
                </div>
            </div>
            <div class="card-body">
                <table id="tabela" class="table table-striped table-bordered table-hover w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Produto</th>
                            <th>Quantidade</th>
                            <th>Valor Total</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>Maria</td><td>Notebook</td><td>1</td><td>R$ 4.200,00</td><td>17/03/2026</td></tr>
                        <tr><td>2</td><td>João</td><td>Teclado</td><td>2</td><td>R$ 1.400,00</td><td>16/03/2026</td></tr>
                        <tr><td>3</td><td>Ana</td><td>Monitor 27"</td><td>1</td><td>R$ 2.900,00</td><td>15/03/2026</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.8/js/dataTables.responsive.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/responsive/3.0.8/js/responsive.bootstrap5.js" crossorigin="anonymous"></script>

    <script type="module" src="venda.js"></script>
</body>

</html>
